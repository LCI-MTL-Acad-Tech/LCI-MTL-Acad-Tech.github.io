<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class//Act — Renforcement POO</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    /* ── Home-specific styles ── */
    .home-hero { padding: 4rem 0 3rem; border-bottom: 1px solid var(--ch6); margin-bottom: 3rem; }
    .home-hero h1 { font-size: clamp(3rem,5vw,5rem); font-weight:800; line-height:1.1; margin-bottom:1.2rem; }
    .home-hero h1 em { font-style:normal; color:var(--amber); }
    .home-hero p { font-size:1.65rem; color:var(--ch2); max-width:660px; line-height:1.65; }

    /* ── Global star bar ── */
    .star-bar {
      display:flex; align-items:center; gap:1.6rem; flex-wrap:wrap;
      background:var(--navy2); border:1.5px solid var(--ch6); border-radius:var(--rl);
      padding:1.4rem 2rem; margin-bottom:3rem;
    }
    .star-bar-track {
      position:relative; flex:1; height:28px; min-width:160px;
      background:var(--navy3); border-radius:14px; overflow:hidden;
      border:1px solid var(--ch5);
    }
    .star-bar-fill {
      position:absolute; inset:0; height:100%;
      background: linear-gradient(90deg, var(--amber-d), var(--amber));
      border-radius:14px; transition:width .6s cubic-bezier(.4,.14,.3,1);
    }
    .star-bar-pips {
      position:absolute; inset:0; display:flex; align-items:center;
      justify-content:space-around; pointer-events:none;
    }
    .star-pip {
      font-size:1.35rem; z-index:1; transition:all .3s;
      text-shadow: 0 0 6px rgba(0,0,0,.5);
    }
    .star-pip.lit { color:#fff; }
    .star-pip.unlit { color:rgba(255,255,255,.25); }
    .star-bar-label { font-size:1.35rem; color:var(--ch2); white-space:nowrap; }
    .star-bar-reset {
      background:none; border:none; color:var(--ch4); font-size:1.5rem;
      cursor:pointer; padding:.2rem .5rem; transition:color .15s;
    }
    .star-bar-reset:hover { color:var(--red); }

    /* ── Language pills on home ── */
    .home-langs {
      display:flex; gap:.7rem; flex-wrap:wrap; align-items:center;
      margin-bottom:2.8rem; padding-bottom:2.4rem; border-bottom:1px solid var(--ch6);
    }
    .home-langs-label { font-size:1.3rem; color:var(--ch3); margin-right:.4rem; }
    .hlp {
      font-size:1.2rem; font-weight:600; padding:.35rem 1rem;
      border-radius:20px; border:1.5px solid; background:transparent;
    }
    .hlp-java  { border-color:var(--java);  color:var(--java); }
    .hlp-cs    { border-color:var(--cs);    color:var(--cs); }
    .hlp-py    { border-color:var(--py);    color:var(--py); }
    .hlp-cpp   { border-color:var(--cpp);   color:var(--cpp); }
    .hlp-rust  { border-color:var(--rust);  color:var(--rust); }

    /* ── Week sections ── */
    .week-block { margin-bottom:3rem; }
    .week-label {
      font-size:1.1rem; text-transform:uppercase; letter-spacing:.1em;
      color:var(--ch3); margin-bottom:1.2rem; padding-bottom:.6rem;
      border-bottom:1px solid var(--ch6);
    }
    .schedule-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.4rem;
    }

    /* ── Module cards ── */
    .mcard {
      background:var(--navy2); border:1.5px solid var(--ch6); border-radius:var(--rl);
      padding:1.6rem 1.8rem 1.4rem; display:block; text-decoration:none; color:inherit;
      position:relative; overflow:hidden;
      transition:border-color .18s, transform .18s, box-shadow .18s;
    }
    .mcard::before {
      content:''; position:absolute; top:0; left:0; width:3px; height:100%;
      background:var(--blue); opacity:0; transition:opacity .18s;
    }
    .mcard:hover { border-color:var(--blue); transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(0,0,0,.35); text-decoration:none; }
    .mcard:hover::before { opacity:1; }
    .mcard.m-special { border-color:rgba(242,201,76,.3); }
    .mcard.m-special::before { background:var(--amber); }
    .mcard.m-special:hover { border-color:var(--amber); }
    .mcard.m-done { border-color:rgba(76,175,125,.35); }
    .mcard.m-done::before { background:var(--green); opacity:1; }

    .mcard-top { display:flex; align-items:flex-start; justify-content:space-between;
      gap:.8rem; margin-bottom:.5rem; }
    .mcard-num { font-size:1.1rem; color:var(--ch3); letter-spacing:.1em;
      text-transform:uppercase; font-weight:600; }
    .mcard-stars { font-size:1.2rem; color:var(--amber); flex-shrink:0; }
    .mcard-stars .empty { color:var(--ch5); }
    .mcard-title { font-size:1.65rem; font-weight:700; color:var(--white);
      margin-bottom:.4rem; line-height:1.25; }
    .mcard-sub { font-size:1.3rem; color:var(--ch2); line-height:1.5; }
    .mcard-tag {
      display:inline-block; margin-top:.8rem; font-size:1rem; letter-spacing:.06em;
      text-transform:uppercase; padding:.2rem .7rem; border-radius:10px; font-weight:600;
      background:rgba(242,201,76,.1); color:var(--amber); border:1px solid rgba(242,201,76,.25);
    }

    @media(max-width:600px){
      .schedule-grid { grid-template-columns:1fr; }
      .home-hero h1 { font-size:2.8rem; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="wordmark">Class<span>//</span>Act</div>
  <div class="hdr-r">
    <button id="theme-btn" aria-label="Toggle theme">🌙</button>
    <button id="lang-btn-home">EN</button>
  </div>
</header>

<div id="page-home" style="max-width:clamp(680px,90vw,1100px);margin:0 auto;padding:3.2rem 2.4rem 6rem">

  <div class="home-hero">
    <h1 id="h-title"></h1>
    <p  id="h-sub"></p>
  </div>

  <div class="home-langs">
    <span class="home-langs-label" id="h-lang-label"></span>
    <span class="hlp hlp-java">Java</span>
    <span class="hlp hlp-cs">C#</span>
    <span class="hlp hlp-py">Python</span>
    <span class="hlp hlp-cpp">C++</span>
    <span class="hlp hlp-rust">Rust</span>
  </div>

  <div class="star-bar" id="star-bar">
    <div class="star-bar-track" id="star-track">
      <div class="star-bar-fill" id="star-fill" style="width:0%"></div>
      <div class="star-bar-pips" id="star-pips"></div>
    </div>
    <span class="star-bar-label" id="star-label"></span>
    <button class="star-bar-reset" id="star-reset" title="Reset">↺</button>
  </div>

  <div id="schedule-container"></div>

</div>

<div id="toast"></div>

<script>
/* ── Minimal theme + lang init (no engine dependency) ── */
(function(){
  var th = localStorage.getItem('ca_theme') ||
    (window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', th);
  document.getElementById('theme-btn').textContent = th === 'dark' ? '🌙' : '☀️';
})();

var _storedLang = localStorage.getItem('ca_lang');
var _browserFr = (navigator.language || '').startsWith('fr');
var L = _storedLang || (_browserFr ? 'fr' : 'en');
if (L !== 'fr' && L !== 'en') L = 'fr';

/* ── Toggle helpers ── */
function toggleLang() {
  L = L === 'fr' ? 'en' : 'fr';
  localStorage.setItem('ca_lang', L);
  location.reload();
}
function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ca_theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '🌙' : '☀️';
}
document.getElementById('lang-btn-home').onclick = toggleLang;
document.getElementById('theme-btn').onclick = toggleTheme;
document.getElementById('lang-btn-home').textContent = L === 'fr' ? 'EN' : 'FR';

/* ── Module metadata ── */
var MODS = [
  { num:'00', week:1, special:true,
    fr:{ title:'Introduction à la POO',      sub:'Les 4 piliers, pourquoi la POO, vue d\'ensemble des langages' },
    en:{ title:'Introduction to OOP',        sub:'The 4 pillars, why OOP, language overview' } },
  { num:'01', week:2,
    fr:{ title:'Classes et objets I',        sub:'Attributs, constructeurs, instanciation' },
    en:{ title:'Classes and Objects I',      sub:'Attributes, constructors, instantiation' } },
  { num:'02', week:2,
    fr:{ title:'Classes et objets II',       sub:'Surcharge, equals(), classes internes' },
    en:{ title:'Classes and Objects II',     sub:'Overloading, equals(), inner classes' } },
  { num:'03', week:3,
    fr:{ title:'Génériques',                 sub:'Classes et méthodes paramétrées par un type' },
    en:{ title:'Generics',                   sub:'Type-parameterised classes and methods' } },
  { num:'04', week:3,
    fr:{ title:'Sous-classes et héritage',   sub:'extends, super, redéfinition (@Override)' },
    en:{ title:'Subclasses and Inheritance', sub:'extends, super, method overriding (@Override)' } },
  { num:'05', week:4,
    fr:{ title:'Classes abstraites',         sub:'Méthodes abstraites, quand les utiliser' },
    en:{ title:'Abstract Classes',           sub:'Abstract methods, when to use them' } },
  { num:'06', week:4,
    fr:{ title:'Interfaces I',               sub:'Déclarer et implémenter des interfaces' },
    en:{ title:'Interfaces I',               sub:'Declaring and implementing interfaces' } },
  { num:'07', week:5,
    fr:{ title:'Interfaces II',              sub:'Abstraites vs interfaces, Comparable' },
    en:{ title:'Interfaces II',              sub:'Abstract vs interfaces, Comparable' } },
  { num:'08', week:5,
    fr:{ title:'Collections I',              sub:'List et Queue' },
    en:{ title:'Collections I',              sub:'List and Queue' } },
  { num:'09', week:6,
    fr:{ title:'Collections II',             sub:'Set, comparaison des types de collections' },
    en:{ title:'Collections II',             sub:'Set, comparing collection types' } },
  { num:'10', week:6,
    fr:{ title:'Maps I',                     sub:'HashMap et TreeMap' },
    en:{ title:'Maps I',                     sub:'HashMap and TreeMap' } },
  { num:'11', week:7,
    fr:{ title:'Maps II',                    sub:'LinkedHashMap, choisir le bon type' },
    en:{ title:'Maps II',                    sub:'LinkedHashMap, choosing the right type' } },
  { num:'12', week:7,
    fr:{ title:'Révision intégrative',       sub:'Synthèse, auto-évaluation, exercices croisés' },
    en:{ title:'Integrative Review',         sub:'Synthesis, self-assessment, cross-topic exercises' } },
  { num:'13', week:8, special:true,
    fr:{ title:'Préparation à l\'oral',      sub:'Questions types, vocabulaire, démonstration du raisonnement' },
    en:{ title:'Oral Exam Prep',             sub:'Practice questions, vocabulary, demonstrating reasoning' } },
];

/* Activity counts per module (for star calculation) */
var ACT_COUNTS = [5,5,5,4,4,4,4,4,4,4,5,4,4,5];

/* ── Star logic ──────────────────────────────────────────────
   Global: 5 stars, earned proportionally across ALL modules.
   Each module contributes (done/total) to a global completion %.
   0%→0★  1–20%→1★  21–40%→2★  41–60%→3★  61–80%→4★  81–100%→5★
   Per-card: show ★☆☆ etc based on that module's own completion.
─────────────────────────────────────────────────────────────── */
function modProgress(num) {
  var idx = parseInt(num, 10);
  var total = ACT_COUNTS[idx] || 4;
  try {
    var rec = JSON.parse(localStorage.getItem('ca_m' + num) || '{}');
    var done = Object.values(rec).filter(Boolean).length;
    return { done: done, total: total, pct: total > 0 ? done / total : 0 };
  } catch(e) { return { done:0, total:total, pct:0 }; }
}

function globalPct() {
  var totalActs = ACT_COUNTS.reduce(function(a,b){ return a+b; }, 0);
  var doneActs  = MODS.reduce(function(sum, m) {
    return sum + modProgress(m.num).done;
  }, 0);
  return totalActs > 0 ? doneActs / totalActs : 0;
}

function pctToStars(pct) {
  /* 5 thresholds: cross each 20% band to light a star */
  if (pct >= 0.80) return 5;
  if (pct >= 0.60) return 4;
  if (pct >= 0.40) return 3;
  if (pct >= 0.20) return 2;
  if (pct >  0)    return 1;
  return 0;
}

function cardStars(num) {
  var p = modProgress(num);
  return pctToStars(p.pct);
}

/* ── Render star bar ── */
function renderStarBar() {
  var pct    = globalPct();
  var lit    = pctToStars(pct);
  var fillPct = Math.round(pct * 100);

  document.getElementById('star-fill').style.width = fillPct + '%';

  var pips = '';
  for (var i = 1; i <= 5; i++) {
    pips += '<span class="star-pip ' + (i <= lit ? 'lit' : 'unlit') + '">★</span>';
  }
  document.getElementById('star-pips').innerHTML = pips;

  var completed = MODS.filter(function(m){ return modProgress(m.num).pct === 1; }).length;
  document.getElementById('star-label').textContent = L === 'fr'
    ? lit + '/5 étoiles · ' + completed + '/14 modules complétés'
    : lit + '/5 stars · ' + completed + '/14 modules completed';
}

/* ── Render module cards ── */
function renderCards() {
  var weeks = {};
  MODS.forEach(function(m) {
    if (!weeks[m.week]) weeks[m.week] = [];
    weeks[m.week].push(m);
  });

  var html = '';
  Object.keys(weeks).sort(function(a,b){ return a-b; }).forEach(function(w) {
    var wLabel = L === 'fr' ? 'Semaine ' + w : 'Week ' + w;
    html += '<div class="week-block"><div class="week-label">' + wLabel + '</div><div class="schedule-grid">';
    weeks[w].forEach(function(m) {
      var t = m[L];
      var stars = cardStars(m.num);
      var done  = modProgress(m.num).pct === 1;
      var cls   = 'mcard' + (m.special ? ' m-special' : '') + (done ? ' m-done' : '');

      /* Star row: filled + empty */
      var starHtml = '';
      for (var i = 1; i <= 4; i++) {
        starHtml += i <= stars
          ? '<span>★</span>'
          : '<span class="empty">☆</span>';
      }

      var tag = m.special
        ? '<span class="mcard-tag">' + (m.num === '00' ? (L==='fr'?'Intro':'Intro') : (L==='fr'?'Oral':'Oral')) + '</span>'
        : '';

      html += '<a class="' + cls + '" href="modules/m' + m.num + '.html">'
        + '<div class="mcard-top">'
        +   '<span class="mcard-num">M' + m.num + '</span>'
        +   '<span class="mcard-stars">' + starHtml + '</span>'
        + '</div>'
        + '<div class="mcard-title">' + t.title + '</div>'
        + '<div class="mcard-sub">'   + t.sub   + '</div>'
        + tag
        + '</a>';
    });
    html += '</div></div>';
  });
  document.getElementById('schedule-container').innerHTML = html;
}

/* ── Main init ── */
document.addEventListener('DOMContentLoaded', function() {
  document.documentElement.lang = L;
  document.title = L === 'fr' ? 'Class//Act — Renforcement POO' : 'Class//Act — OOP Reinforcement';

  document.getElementById('h-title').innerHTML = L === 'fr'
    ? 'Renforcement <em>POO</em>' : 'OOP <em>Reinforcement</em>';
  document.getElementById('h-sub').textContent = L === 'fr'
    ? 'Quatorze modules pour consolider les fondements de la Programmation Orientée Objet — classes, héritage, interfaces et collections — avec des exemples en Java, C#, Python, C++ et Rust.'
    : 'Fourteen modules to consolidate the foundations of Object-Oriented Programming — classes, inheritance, interfaces and collections — with examples in Java, C#, Python, C++ and Rust.';
  document.getElementById('h-lang-label').textContent = L === 'fr'
    ? 'Chaque module est disponible en :' : 'Each module available in:';

  document.getElementById('star-reset').title = L === 'fr' ? 'Réinitialiser la progression' : 'Reset progress';
  document.getElementById('star-reset').onclick = function() {
    if (!confirm(L === 'fr' ? 'Réinitialiser toute la progression ?' : 'Reset all progress?')) return;
    MODS.forEach(function(m) { localStorage.removeItem('ca_m' + m.num); });
    location.reload();
  };

  renderStarBar();
  renderCards();

  /* footer */
  var foot = document.createElement('footer');
  foot.className = 'site-footer-credits';
  foot.innerHTML = '<div class="footer-inner"><p class="footer-heading">'
    + (L==='fr'?'Comment cet outil a été créé':'How this tool was made') + '</p>'
    + '<p>' + (L==='fr'
      ? 'Construit en collaboration entre <strong>Elisa Schaeffer</strong> (doyen·ne, Technologie et Design, Collège LaSalle Montréal) et <strong>Claude</strong> (Anthropic). Le contenu pédagogique a été défini et vérifié par Elisa à chaque étape.'
      : 'Built through iterative collaboration between <strong>Elisa Schaeffer</strong> (Dean of Technology and Design, Collège LaSalle Montréal) and <strong>Claude</strong> (Anthropic). Pedagogical content was defined and verified by Elisa at every step.') + '</p>'
    + '<p class="footer-note">' + (L==='fr'
      ? 'Utilisation réfléchie de l\'IA — l\'humain reste auteur. Juin 2026.'
      : 'Thoughtful AI use — the human remains the author. June 2026.') + '</p></div>';
  document.getElementById('page-home').appendChild(foot);
});
</script>
</body>
</html>
