<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class//Act — M07</title>
  <link rel="stylesheet" href="../style.css">

</header>

<!-- Language selector -->

  <div id="module-body"></div>
  <div id="mod-hw"></div>
  <div id="mod-refs"></div>

  <div class="mod-nav">
    <button class="mod-nav-btn hidden" id="prev-mod-btn"></button>
    <button class="mod-nav-btn primary" id="next-mod-btn"></button>

<div id="toast"></div>
<script src="../engine.js"></script>
