<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code//Switch — Module 0</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<header class="site-header">
  <div style="display:flex;align-items:center;gap:1.4rem">
    <button id="back-btn">← Accueil</button>
    <div class="wordmark">Code<span>//</span>Switch</div>
  </div>
  <div class="hdr-r">
    <span class="mode-pill m0-pill" id="mode-pill"></span>
    <button id="lang-btn">EN</button>
  </div>
</header>

<div id="page-session">
  <div class="sess-hdr">
    <div class="sess-bloc-lbl" id="sess-bloc-lbl"></div>
    <h2 id="sess-title"></h2>
    <p id="sess-sub"></p>
  </div>

  <!-- Shared concept (intro text) -->
  <div id="sess-concept"></div>

  <!-- Single panel — no path split for Module 0 -->
  <div id="panel-m0"></div>

  <div class="sess-nav">
    <button class="btn sec hidden" id="prev-sess-btn">← Précédent</button>
    <button class="btn" id="next-sess-btn"></button>
  </div>
</div>

<div id="toast"></div>
<script src="../engine.js"></script>
<script src="s00.js"></script>
</body>
</html>
