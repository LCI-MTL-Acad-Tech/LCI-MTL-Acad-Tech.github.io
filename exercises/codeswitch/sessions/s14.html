<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code//Switch — S14</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<header class="site-header">
  <div style="display:flex;align-items:center;gap:1.4rem">
    <button id="back-btn">← Accueil</button>
    <div class="wordmark">Code<span>//</span>Switch</div>
  </div>
  <div class="hdr-r">
    <span class="mode-pill" id="mode-pill"></span>
    <button id="lang-btn">EN</button>
  </div>
</header>

<div id="page-session">
  <div class="sess-hdr">
    <div class="sess-bloc-lbl" id="sess-bloc-lbl"></div>
    <h2 id="sess-title"></h2>
    <p id="sess-sub"></p>
  </div>

  <!-- Shared concept block — rendered above path tabs -->
  <div id="sess-concept"></div>

  <!-- Path tabs -->
  <div class="path-tabs">
    <button class="path-tab" id="tab-ide"></button>
    <button class="path-tab" id="tab-engine"></button>
  </div>

  <!-- Path panels -->
  <div id="panel-ide"    style="display:none"></div>
  <div id="panel-engine" style="display:none"></div>

  <div class="sess-nav">
    <button class="btn sec" id="prev-sess-btn">← Précédent</button>
    <button class="btn"     id="next-sess-btn"></button>
  </div>
</div>

<div id="toast"></div>
<script src="../engine.js"></script>
<script src="s14.js"></script>
</body>
</html>
