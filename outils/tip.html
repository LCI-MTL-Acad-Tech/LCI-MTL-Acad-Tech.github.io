<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conseil IA du jour — Collège LaSalle Montréal</title>
<style>
  :root {
    --gold: #cc9f11; --gold-bg: #fffbe6; --gold-border: #f0d060;
    --ink: #1a1a1a; --mid: #555;
    --c0: #eb2d37; --c1: #cc9f11; --c2: #5b8000; --c3: #337996; --c4: #7b4fa6;
    --bg0: #fde8e9; --bg1: #fdf3d9; --bg2: #e8f0d6; --bg3: #d9edf5; --bg4: #ece3f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, 'Segoe UI', Arial, sans-serif; background: var(--gold-bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 28px 24px 36px; flex: 1; }
  .day-badge { display: inline-flex; align-items: center; gap: 6px; font-size: .72rem; font-weight: 700; color: var(--gold); background: #fff; border: 1.5px solid var(--gold-border); border-radius: 20px; padding: 3px 12px; margin-bottom: 20px; }
  .tip-card { background: #fff; border: 2px solid var(--gold-border); border-radius: 14px; padding: 24px 26px; margin-bottom: 20px; position: relative; }
  .tip-card::before { content: '«'; position: absolute; top: -18px; left: 18px; font-size: 3rem; color: var(--gold-border); font-family: Georgia, serif; line-height: 1; }
  .tip-text { font-size: 1.05rem; line-height: 1.7; font-style: italic; }
  .tip-text em { font-style: normal; font-weight: 700; color: var(--gold); }
  .tip-source { font-size: .78rem; color: var(--mid); margin-top: 14px; padding-top: 12px; border-top: 1px solid #f0ecd8; }
  .tip-source a { color: var(--c3); text-decoration: none; }
  .tip-source a:hover { text-decoration: underline; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
  .tag { font-size: .7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: .03em; }
  .nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .nav-btn { font-size: .8rem; font-weight: 600; color: var(--gold); background: #fff; border: 1.5px solid var(--gold-border); border-radius: 8px; padding: 6px 16px; cursor: pointer; transition: background .15s; }
  .nav-btn:hover { background: var(--gold-bg); }
  .nav-btn:disabled { opacity: .35; cursor: default; }
  .nav-date { font-size: .75rem; color: var(--mid); text-align: center; }
  footer { text-align: center; font-size: .68rem; color: #bbb; padding: 12px 24px 20px; line-height: 1.7; }
  footer a { color: #bbb; }
  @media (max-width: 500px) { .wrap { padding: 20px 16px 28px; } .tip-text { font-size: .95rem; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="day-badge"><span>📅</span><span id="date-label">—</span></div>
  <div class="tip-card">
    <p class="tip-text" id="tip-text">…</p>
    <div class="tip-source" id="tip-source" style="display:none"></div>
  </div>
  <div class="tags" id="tip-tags"></div>
  <div class="nav">
    <button class="nav-btn" id="btn-prev" onclick="go(-1)">←</button>
    <div class="nav-date" id="nav-date"></div>
    <button class="nav-btn" id="btn-next" onclick="go(1)">→</button>
  </div>
</div>
<footer id="footer-text"></footer>

<script>
const COLOR_MAP = { c0:"#eb2d37", c1:"#cc9f11", c2:"#5b8000", c3:"#337996", c4:"#7b4fa6" };
const BG_MAP    = { c0:"#fde8e9", c1:"#fdf3d9", c2:"#e8f0d6", c3:"#d9edf5", c4:"#ece3f5" };

const UI = {
  fr: {
    today:"aujourd'hui", prev:function(n){return n+" jour"+(n>1?"s":"")+" plus tôt";}, next:function(n){return n+" jour"+(n>1?"s":"")+" plus tard";},
    prevBtn:"← précédent", nextBtn:"suivant →",
    disclaimer:"Ces conseils sont des points de départ, non des directives. Leur application requiert le jugement professionnel du lecteur ou de la lectrice.",
    attribution:'Conception assistée par IA — contenu structuré en collaboration avec <a href="https://claude.ai" target="_blank">Claude Sonnet (Anthropic)</a>',
    url:"https://lci-mtl-acad-tech.github.io/outils/tip.html"
  },
  en: {
    today:"today", prev:function(n){return n+" day"+(n>1?"s":"")+" earlier";}, next:function(n){return n+" day"+(n>1?"s":"")+" later";},
    prevBtn:"← previous", nextBtn:"next →",
    disclaimer:"These tips are starting points, not directives. Applying them requires the reader's own professional judgement.",
    attribution:'AI-assisted design — content structured in collaboration with <a href="https://claude.ai" target="_blank">Claude Sonnet (Anthropic)</a>',
    url:"https://lci-mtl-acad-tech.github.io/outils/tip.html?lang=en"
  },
  es: {
    today:"hoy", prev:function(n){return "hace "+n+" día"+(n>1?"s":"");}, next:function(n){return "en "+n+" día"+(n>1?"s":"");},
    prevBtn:"← anterior", nextBtn:"siguiente →",
    disclaimer:"Estos consejos son puntos de partida, no directivas. Su aplicación requiere el juicio profesional del lector o la lectora.",
    attribution:'Diseño asistido por IA — contenido estructurado en colaboración con <a href="https://claude.ai" target="_blank">Claude Sonnet (Anthropic)</a>',
    url:"https://lci-mtl-acad-tech.github.io/outils/tip.html?lang=es"
  }
};

var params = new URLSearchParams(window.location.search);
var lang = ['fr','en','es'].indexOf(params.get('lang')) >= 0 ? params.get('lang') : 'fr';
var ui = UI[lang];

document.documentElement.lang = lang;
if (lang === 'en') document.title = 'AI Tip of the Day — Collège LaSalle Montréal';
if (lang === 'es') document.title = 'Consejo IA del día — Collège LaSalle Montréal';

document.getElementById('btn-prev').textContent = ui.prevBtn;
document.getElementById('btn-next').textContent = ui.nextBtn;
document.getElementById('footer-text').innerHTML =
  ui.attribution + '<br>' + ui.disclaimer + '<br>' +
  '<a href="' + ui.url + '" target="_blank">' + ui.url + '</a>';

function dayOfYear() {
  var now = new Date();
  return Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
}

function formatDate(offset) {
  var d = new Date(); d.setDate(d.getDate() + offset);
  var locale = lang === 'es' ? 'es-ES' : lang === 'en' ? 'en-CA' : 'fr-CA';
  return d.toLocaleDateString(locale, {day:'numeric', month:'long'});
}

var TIPS = [];
var currentOffset = 0;

function render(offset) {
  if (!TIPS.length) return;
  var idx = ((dayOfYear() + offset) % TIPS.length + TIPS.length) % TIPS.length;
  var tip = TIPS[idx];

  document.getElementById('tip-text').innerHTML = tip[lang];

  var src = document.getElementById('tip-source');
  if (tip.source && tip.source[lang]) {
    src.innerHTML = '🔗 <a href="' + tip.source[lang].href + '" target="_blank">' + tip.source[lang].label + '</a>';
    src.style.display = 'block';
  } else { src.style.display = 'none'; }

  var tagsEl = document.getElementById('tip-tags');
  tagsEl.innerHTML = '';
  var tagLabels = (tip.tags && tip.tags[lang]) ? tip.tags[lang] : [];
  var colors = tip.colors || [];
  tagLabels.forEach(function(label, i) {
    var c = colors[i] || 'c1';
    var span = document.createElement('span');
    span.className = 'tag';
    span.textContent = label;
    span.style.background = BG_MAP[c];
    span.style.color = COLOR_MAP[c];
    span.style.border = '1px solid ' + COLOR_MAP[c] + '44';
    tagsEl.appendChild(span);
  });

  document.getElementById('date-label').textContent = formatDate(offset);
  var abs = Math.abs(offset);
  document.getElementById('nav-date').textContent =
    offset === 0 ? ui.today : offset < 0 ? ui.prev(abs) : ui.next(abs);

  document.getElementById('btn-prev').disabled = offset <= -(TIPS.length - 1);
  document.getElementById('btn-next').disabled = offset >= 0;
}

function go(dir) { currentOffset += dir; render(currentOffset); }

fetch('tips.json')
  .then(function(r){ return r.json(); })
  .then(function(data){ TIPS = data; render(0); })
  .catch(function(){
    document.getElementById('tip-text').textContent =
      lang==='en' ? 'Could not load tips.' :
      lang==='es' ? 'No se pudieron cargar los consejos.' :
                    'Impossible de charger les conseils.';
  });
</script>
</body>
</html>
