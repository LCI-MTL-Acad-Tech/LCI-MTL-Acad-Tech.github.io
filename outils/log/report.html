<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="upload-form-url" content="https://forms.cloud.microsoft/r/LE4Dc2gZaE">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapport de stage</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPCEtLSBCYWNrZ3JvdW5kIGNpcmNsZSAtLT4KICA8Y2lyY2xlIGN4PSIxNiIgY3k9IjE2IiByPSIxNiIgZmlsbD0iIzAwNTg3YyIvPgogIDwhLS0gQnJpZWZjYXNlIGJvZHkgLS0+CiAgPHJlY3QgeD0iNSIgeT0iMTMiIHdpZHRoPSIyMiIgaGVpZ2h0PSIxNCIgcng9IjIuNSIgZmlsbD0id2hpdGUiLz4KICA8IS0tIEJyaWVmY2FzZSBoYW5kbGUgLS0+CiAgPHBhdGggZD0iTTExIDEzdi0yLjVhMSAxIDAgMCAxIDEtMWg4YTEgMSAwIDAgMSAxIDFWMTMiIGZpbGw9Im5vbmUiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+CiAgPCEtLSBDZW50ZXIgY2xhc3AgLS0+CiAgPHJlY3QgeD0iMTMuNSIgeT0iMTcuNSIgd2lkdGg9IjUiIGhlaWdodD0iMyIgcng9IjEiIGZpbGw9IiMwMDU4N2MiLz4KICA8IS0tIEhvcml6b250YWwgYmFuZCAtLT4KICA8cmVjdCB4PSI1IiB5PSIxOC41IiB3aWR0aD0iMjIiIGhlaWdodD0iMi41IiBmaWxsPSJyZ2JhKDAsODgsMTI0LDAuMTUpIi8+Cjwvc3ZnPg==">
  <link rel="stylesheet" href="style.css">
  <style>
    .report-nav { display: flex; gap: var(--sp-2); flex-wrap: wrap; margin-bottom: var(--sp-8); }
    .report-nav-btn { padding: var(--sp-2) var(--sp-4); border-radius: var(--r-pill); font-size: 1.4rem; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: var(--bg-card); color: var(--text-muted); font-family: inherit; transition: all var(--dur-fast); }
    .report-nav-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    .report-section { display: none; }
    .report-section.active { display: block; }
    .chart-wrap { background: var(--bg-card); border-radius: var(--r-lg); padding: var(--sp-5); box-shadow: var(--shadow-md); margin-bottom: var(--sp-6); }
    .word-cloud { display: flex; flex-wrap: wrap; gap: var(--sp-3); padding: var(--sp-4); }
    .word-item { border-radius: var(--r-pill); padding: 0.3rem var(--sp-3); font-weight: 500; background: var(--tag-bg); color: var(--tag-text); }
    .tool-bar { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-2); }
    .tool-bar-track { flex: 1; height: 2.4rem; background: var(--bg-subtle); border-radius: var(--r-pill); overflow: hidden; }
    .tool-bar-fill { height: 100%; background: var(--accent); border-radius: var(--r-pill); transition: width var(--dur-slow) var(--ease-exp); }
    .reflection-text { font-size: 1.5rem; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
    .reflection-label { font-size: 1.2rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-subtle); margin-bottom: var(--sp-2); }
    .reflection-block { margin-bottom: var(--sp-6); padding-bottom: var(--sp-6); border-bottom: 1px solid var(--border); }
    .reflection-block:last-child { border-bottom: none; }
    .competency-item { padding: var(--sp-3) var(--sp-4); background: var(--bg-subtle); border-radius: var(--r-md); margin-bottom: var(--sp-2); }
    .project-outcome-card { border: 1.5px solid var(--border); border-radius: var(--r-lg); padding: var(--sp-5); margin-bottom: var(--sp-4); background: var(--bg-card); }
  </style>
</head>
<body>
<div class="page-wrap">

  <header class="site-header">
    <div class="container container--wide">
      <div class="header-inner">
        <a href="index.html" class="site-title" style="text-decoration:none;">
          Journal de stage<span></span>
        </a>
        <nav class="site-nav">
          <a href="index.html" class="nav-link" data-i18n="nav.setup">Configuration</a>
          <a href="calendar.html" class="nav-link" data-i18n="nav.calendar">Calendrier</a>
          <a href="log.html" class="nav-link" data-i18n="nav.log">Journal</a>
          <a href="weekly.html" class="nav-link" data-i18n="nav.weekly">Bilan hebdo</a>
          <a href="report.html" class="nav-link active" data-i18n="nav.report">Suivi</a>
        </nav>
        <div class="header-actions">
          <button class="btn btn--ghost btn--sm lang-toggle-btn" data-lang-target="fr-CA">FR</button>
          <button class="btn btn--ghost btn--sm lang-toggle-btn" data-lang-target="en-CA">EN</button>
          <button class="btn btn--ghost btn--sm theme-toggle-btn" aria-label="Toggle theme" style="padding:var(--sp-2);line-height:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg></button>
          <button class="btn btn--ghost btn--sm reset-trigger-btn" onclick="openResetModal()" data-i18n="nav.reset" title="" style="opacity:.6"></button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container container--wide">

      <!-- ── PHASE 1: Upload ─────────────────────────────── -->
      <div id="phase-upload">
        <div style="max-width:60rem; margin:0 auto;">
          <h2 data-i18n="report.upload_title" style="margin-bottom:var(--sp-3)"></h2>
          <p class="text-muted" data-i18n="report.upload_instructions" style="margin-bottom:var(--sp-6)"></p>

          <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
            <div class="upload-icon">📂</div>
            <p data-i18n="report.upload_cta" style="font-size:1.6rem;font-weight:500;margin-bottom:var(--sp-2)"></p>
            <p class="text-muted" data-i18n="report.upload_drop" style="font-size:1.4rem"></p>
            <input type="file" id="file-input" accept=".json" multiple style="display:none" onchange="handleFiles(this.files)">
          </div>

          <div id="upload-files-list" class="upload-files-list hidden"></div>

          <!-- Clear cached session — useful for testing / switching students -->
          <div id="clear-cache-row" style="text-align:right;margin-top:var(--sp-3);display:none">
            <button onclick="clearReportCache()"
              style="background:none;border:none;cursor:pointer;font-family:inherit;
                     font-size:1.3rem;color:var(--text-subtle);text-decoration:underline;padding:0">
              ✕ <span data-i18n="report.clear_cache">Effacer la session en cache</span>
            </button>
          </div>

          <div id="upload-errors" class="hidden"></div>
          <div id="upload-conflicts" class="hidden"></div>

          <button class="btn btn--primary btn--full btn--lg mt-6 hidden" id="proceed-btn"
                  onclick="proceedToReflection()" data-i18n="action.next"></button>
        </div>
      </div>

      <!-- ── PHASE 2: Reflection forms ──────────────────── -->
      <div id="phase-reflection" class="hidden">
        <h2 data-i18n="report.section_reflection" style="margin-bottom:var(--sp-6)"></h2>

        <div class="card mb-4">
          <div class="section-title" data-i18n="report.section_reflection"></div>

          <div class="form-group">
            <label data-i18n="report.reality_vs_expectation"></label>
            <textarea id="r-reality" rows="4"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.significant_work"></label>
            <textarea id="r-significant" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.proud_moment"></label>
            <textarea id="r-proud" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.failure_moment"></label>
            <textarea id="r-failure" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.failure_lesson"></label>
            <textarea id="r-failure-lesson" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.env_lesson"></label>
            <textarea id="r-env" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.supervisor_rel"></label>
            <textarea id="r-supervisor" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.advice"></label>
            <textarea id="r-advice" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.would_do_differently"></label>
            <textarea id="r-different" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.suggestions_school"></label>
            <p class="form-hint" data-i18n="report.suggestions_school_q" style="margin-bottom:var(--sp-2)"></p>
            <textarea id="r-suggestions-school" rows="4"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.comments"></label>
            <textarea id="r-comments" rows="2"></textarea>
          </div>
        </div>

        <!-- Tools reflection -->
        <div class="card mb-4">
          <div class="section-title" data-i18n="report.tools_reflection_title"></div>
          <div id="tools-reflection-list"></div>
        </div>

        <!-- Collaborator appreciation -->
        <div class="card mb-4">
          <div class="section-title" data-i18n="report.collab_title"></div>
          <p class="text-muted" style="font-size:1.3rem;margin-bottom:var(--sp-4)" data-i18n="report.collab_note"></p>
          <div id="collab-appreciation-list"></div>
        </div>

        <!-- Competencies -->
        <div class="card mb-4">
          <div class="section-title" data-i18n="report.competencies_title"></div>

          <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
              <span data-i18n="report.competencies_helpful"></span>
              <span class="accordion-arrow">▼</span>
            </button>
            <div class="accordion-body">
              <p class="text-muted" style="font-size:1.4rem;margin-bottom:var(--sp-4)" data-i18n="report.competencies_helpful_q"></p>
              <div id="competencies-helpful-list"></div>
              <button class="add-block-btn" onclick="addCompetencyBlock('helpful')">
                + <span data-i18n="action.add"></span>
              </button>
            </div>
          </div>

          <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
              <span data-i18n="report.competencies_gaps"></span>
              <span class="accordion-arrow">▼</span>
            </button>
            <div class="accordion-body">
              <p class="text-muted" style="font-size:1.4rem;margin-bottom:var(--sp-4)" data-i18n="report.competencies_gaps_q"></p>
              <div id="competencies-gaps-list"></div>
              <button class="add-block-btn" onclick="addCompetencyBlock('gaps')">
                + <span data-i18n="action.add"></span>
              </button>
            </div>
          </div>

          <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
              <span data-i18n="report.competencies_improve"></span>
              <span class="accordion-arrow">▼</span>
            </button>
            <div class="accordion-body">
              <p class="text-muted" style="font-size:1.4rem;margin-bottom:var(--sp-4)" data-i18n="report.competencies_improve_q"></p>
              <div id="competencies-improve-list"></div>
              <button class="add-block-btn" onclick="addCompetencyBlock('improve')">
                + <span data-i18n="action.add"></span>
              </button>
            </div>
          </div>
        </div>

        <!-- Project outcomes (hub) -->
        <div class="card mb-4 hidden" id="project-outcomes-card">
          <div class="section-title" data-i18n="report.project_outcomes_title"></div>
          <div id="project-outcomes-list"></div>
        </div>

        <!-- Future -->
        <div class="card mb-4">
          <div class="section-title" data-i18n="report.future_title"></div>
          <div class="form-group">
            <label data-i18n="report.future_direction"></label>
            <textarea id="r-future-direction" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.future_next_steps"></label>
            <textarea id="r-future-steps" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label data-i18n="report.future_skills"></label>
            <textarea id="r-future-skills" rows="2"></textarea>
          </div>
        </div>

        <div class="flex justify-between" style="flex-wrap:wrap;gap:var(--sp-3)">
          <button class="btn btn--ghost" onclick="goToPhase('phase-upload')" data-i18n="action.back"></button>
          <div class="flex gap-3" style="flex-wrap:wrap;">
            <button class="btn btn--download" onclick="downloadFullJSON()" data-i18n="report.download_full_json"></button>
            <button class="btn btn--download" onclick="downloadFullJSON()" data-i18n="report.download_full_json"></button>
            <button class="btn btn--secondary" onclick="downloadReflectionJSON()" data-i18n="report.download_reflection"></button>
            <button class="btn btn--primary btn--lg" onclick="generateDashboard()" data-i18n="action.confirm"></button>
          </div>
        </div>
      </div>

      <!-- ── PHASE 3: Dashboard ──────────────────────────── -->
      <div id="phase-dashboard" class="hidden">

        <!-- Summary stats -->
        <div class="flex items-center justify-between mb-6" style="flex-wrap:wrap;gap:var(--sp-4)">
          <h2 data-i18n="dashboard.title" id="dashboard-name"></h2>
          <div class="flex gap-2">
            <button class="btn btn--ghost btn--sm" onclick="editReflection()" data-i18n="report.edit_reflection"></button>
<button class="btn btn--secondary btn--sm" onclick="printReport()"
                data-i18n="dashboard.print_report" style="print-display:none"></button>
          </div>
        </div>

        <div class="stat-grid mb-6" id="stat-grid"></div>

        <!-- Nav tabs -->
        <div class="report-nav" id="report-nav"></div>

        <!-- Section: Timeline -->
        <div class="report-section active" id="section-timeline">
          <div class="chart-wrap">
            <h4 data-i18n="dashboard.section_timeline" style="margin-bottom:var(--sp-4)"></h4>
            <div class="timeline-chart" id="timeline-chart"></div>
            <div class="timeline-legend" id="timeline-legend"></div>
          </div>

        </div>

        <!-- Section: Breakdown -->
        <div class="report-section" id="section-breakdown">
          <div class="chart-wrap">
            <h4 data-i18n="dashboard.section_breakdown" style="margin-bottom:var(--sp-5)"></h4>
            <div id="breakdown-chart"></div>
          </div>
        </div>

        <!-- Section: Modality -->
        <div class="report-section" id="section-modality">
          <div class="chart-wrap">
            <h4 data-i18n="dashboard.section_modality" style="margin-bottom:var(--sp-5)"></h4>
            <div id="modality-chart"></div>
            <div style="margin-top:var(--sp-5)">
              <div style="font-size:1.3rem;color:var(--text-subtle);margin-bottom:var(--sp-3)" data-i18n="dashboard.section_modality"></div>
              <div id="modality-calendar" style="display:flex;flex-wrap:wrap;gap:4px;"></div>
            </div>
          </div>
        </div>

        <!-- Section: Mood -->
        <div class="report-section" id="section-mood">
          <div class="chart-wrap">
            <h4 data-i18n="dashboard.section_mood" style="margin-bottom:var(--sp-5)"></h4>
            <p class="text-muted" style="font-size:1.3rem;margin-bottom:var(--sp-4)" data-i18n="dashboard.mood_timeline"></p>
            <div id="mood-chart" style="overflow-x:auto"></div>
          </div>
        </div>

        <!-- Section: Weekly wraps -->
        <div class="report-section" id="section-weekly">
          <div id="weekly-wraps-content"></div>
        </div>

        <!-- Section: Competency progress -->
        <div class="report-section" id="section-competencies">
          <div id="competency-progress-content"></div>
        </div>

        <!-- Section: Tools -->
        <div class="report-section" id="section-tools">
          <div class="chart-wrap">
            <h4 data-i18n="dashboard.section_tools" style="margin-bottom:var(--sp-5)"></h4>
            <div id="tools-chart"></div>
          </div>
        </div>

        <!-- Section: Lessons -->
        <div class="report-section" id="section-lessons">
          <div class="chart-wrap">
            <h4 data-i18n="dashboard.section_lessons" style="margin-bottom:var(--sp-4)"></h4>
            <div class="word-cloud" id="lessons-cloud"></div>
          </div>
        </div>

        <!-- Section: Reflection -->
        <div class="report-section" id="section-reflection">
          <div class="card" id="reflection-content"></div>
        </div>

      </div><!-- /phase-dashboard -->

    </div>
  </main>

  <!-- Mobile bottom nav -->
  
<!-- Reset confirmation modal -->
<div id="reset-modal" class="reset-modal-overlay hidden" onclick="closeResetModal(event)">
  <div class="reset-modal-box" role="dialog" aria-modal="true" aria-labelledby="reset-modal-title">
    <div class="reset-modal-header">
      <h3 id="reset-modal-title" data-i18n="reset.title"></h3>
    </div>
    <div class="reset-modal-body">
      <div class="alert alert--error mb-4">
        <span style="font-size:2rem;flex-shrink:0">⚠</span>
        <div>
          <p data-i18n="reset.warning" style="margin-bottom:var(--sp-2)"></p>
          <p><strong data-i18n="reset.download_first"></strong></p>
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="reset.confirm_label"></label>
        <input type="text" id="reset-confirm-input"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          oninput="checkResetConfirm(this.value)"
          style="font-family:monospace;letter-spacing:0.1em;font-size:1.6rem">
      </div>
      <div class="form-group">
        <label class="modality-label">
          <input type="checkbox" id="reset-keep-prefs" checked>
          <span data-i18n="reset.keep_prefs"></span>
        </label>
      </div>
    </div>
    <div class="reset-modal-footer">
      <button class="btn btn--ghost" onclick="closeResetModal()" data-i18n="reset.cancel"></button>
      <button class="btn btn--danger" id="reset-confirm-btn" disabled
        onclick="executeReset()" data-i18n="reset.cta"></button>
    </div>
  </div>
</div>

<nav class="mobile-nav">
    <a href="index.html" class="mobile-nav-item">
      <span class="mobile-nav-icon">⚙</span>
      <span data-i18n="nav.setup">Config</span>
    </a>
    <a href="log.html" class="mobile-nav-item">
      <span class="mobile-nav-icon">📋</span>
      <span data-i18n="nav.log">Journal</span>
    </a>
    <a href="weekly.html" class="mobile-nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span data-i18n="nav.weekly">Hebdo</span>
      </a>
      <a href="report.html" class="mobile-nav-item active">
      <span class="mobile-nav-icon">📊</span>
      <span data-i18n="nav.report">Rapport</span>
    </a>
  </nav>

  <footer class="site-footer">
    <div class="making-of">
      <div class="making-of-inner">
        <button class="making-of-toggle" onclick="toggleMakingOf(this)" aria-expanded="false">
          <span class="making-of-label" data-i18n="making.label">Comment cet outil a été créé</span>
          <span class="making-of-chevron" aria-hidden="true">›</span>
        </button>
        <div class="making-of-body" hidden>
          <div class="making-of-divider"></div>
          <p data-i18n="making.p1"></p>
          <p data-i18n="making.p2"></p>
          <p><strong data-i18n="making.p3"></strong> <span data-i18n="making.updated"></span></p>
        </div>
      </div>
    </div>
  </footer>
</div>

<script src="lang.js"></script>
<script src="app.js"></script>
<script src="courses.js"></script>
<script src="report.js"></script>
</body>
</html>
