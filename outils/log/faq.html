<style>
@font-face {

@font-face {
  font-family: 'LCI Education Color Logos';
  src: local('LCI Education Color Logos'),
       url('https://dam.lcieducation.com/LCI-Education/Brand-management/Font/lci-color-logos.woff2?func=proxy') format('woff2');

:root {
–blue: #00587c;
–blue-dark: #003f59;
–blue-light: #e6f1fb;
–red: #eb2d37;
–cream: #f8f5e9;
–charcoal: #07181e;
–cobalt: #685ef7;
–cobalt-light: #eeedfe;
–text: #07181e;
–text-muted: #4a5e66;
–bg: #ffffff;
–bg-secondary: #f8f5e9;
–bg-tertiary: #f0ede0;
–border: rgba(7,24,30,0.12);
–border-hover: rgba(7,24,30,0.25);
–accent: #00587c;
–tag-bg: #e6f1fb;
–tag-text: #003f59;
–highlight: #685ef7;
–highlight-bg: #eeedfe;
–answer-bg: #fafaf8;
–radius: 8px;
–radius-lg: 12px;
}

[data-theme=“dark”] {
–text: #f0ece0;
–text-muted: #8fa8b2;
–bg: #07181e;
–bg-secondary: #0d2630;
–bg-tertiary: #112e3a;
–border: rgba(240,236,224,0.1);
–border-hover: rgba(240,236,224,0.25);
–accent: #3da8d8;
–tag-bg: #0d2630;
–tag-text: #7ccaea;
–highlight: #9b93f9;
–highlight-bg: #1c1847;
–answer-bg: #0d2630;
–blue-light: #0d2630;
–cobalt-light: #1c1847;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
font-family: ‘Modern Gothic’, system-ui, -apple-system, sans-serif;
font-weight: 400;
background: var(–bg);
color: var(–text);
line-height: 1.55;
font-size: 16px;
transition: background 0.25s, color 0.25s;
}

a { color: var(–accent); text-decoration: underline; text-underline-offset: 2px; }
a:hover { opacity: 0.8; }

.lci-color-logo {
font-family: ‘LCI Education Color Logos’, sans-serif;
speak: never;
line-height: 1;
-webkit-font-smoothing: antialiased;
}

header {
background: var(–charcoal);
padding: 20px 32px;
display: flex;
align-items: center;
justify-content: space-between;
gap: 16px;
position: sticky;
top: 0;
z-index: 100;
border-bottom: 3px solid var(–blue);
}

.header-left {
display: flex;
align-items: center;
gap: 14px;
}

.header-title {
color: #f0ece0;
font-size: 15px;
font-weight: 500;
letter-spacing: -0.02em;
line-height: 1.2;
}

.header-title span {
display: block;
font-size: 11px;
font-weight: 400;
opacity: 0.55;
letter-spacing: 0.04em;
text-transform: uppercase;
}

.header-controls {
display: flex;
align-items: center;
gap: 8px;
}

.ctrl-btn {
background: rgba(240,236,224,0.08);
border: 1px solid rgba(240,236,224,0.15);
color: #f0ece0;
padding: 6px 14px;
border-radius: 20px;
font-family: ‘Modern Gothic’, sans-serif;
font-size: 13px;
cursor: pointer;
transition: background 0.2s;
white-space: nowrap;
}

.ctrl-btn:hover { background: rgba(240,236,224,0.16); }
.ctrl-btn.active { background: var(–blue); border-color: var(–blue); }

.hero {
background: var(–bg-secondary);
border-bottom: 1px solid var(–border);
padding: 40px 32px 32px;
}

.hero h1 {
font-size: clamp(26px, 4vw, 38px);
font-weight: 400;
letter-spacing: -0.03em;
line-height: 1.05;
margin-bottom: 10px;
color: var(–text);
}

.hero p {
font-size: 15px;
color: var(–text-muted);
max-width: 560px;
}

.search-bar {
margin-top: 20px;
position: relative;
max-width: 520px;
display: flex;
align-items: center;
}

.search-bar input {
width: 100%;
padding: 12px 40px 12px 42px;
border: 1px solid var(–border-hover);
border-radius: 24px;
font-family: ‘Modern Gothic’, sans-serif;
font-size: 15px;
background: var(–bg);
color: var(–text);
outline: none;
transition: border-color 0.2s, box-shadow 0.2s;
}

.search-bar input:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px rgba(0,88,124,0.12);
}

.search-icon {
position: absolute;
left: 15px;
top: 50%;
transform: translateY(-50%);
color: var(–text-muted);
font-size: 16px;
pointer-events: none;
}

.clear-btn {
position: absolute;
right: 12px;
top: 50%;
transform: translateY(-50%);
background: none;
border: none;
color: var(–text-muted);
cursor: pointer;
font-size: 15px;
padding: 4px;
display: none;
}

.main {
display: grid;
grid-template-columns: 220px 1fr;
gap: 0;
max-width: 1000px;
margin: 0 auto;
min-height: calc(100vh - 200px);
}

.sidebar {
padding: 28px 16px 28px 32px;
border-right: 1px solid var(–border);
position: sticky;
top: 65px;
height: calc(100vh - 65px);
overflow-y: auto;
}

.sidebar-label {
font-size: 10px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–text-muted);
margin-bottom: 10px;
font-weight: 500;
}

.cat-btn {
display: flex;
align-items: center;
gap: 8px;
width: 100%;
text-align: left;
background: none;
border: none;
padding: 7px 10px;
border-radius: var(–radius);
font-family: ‘Modern Gothic’, sans-serif;
font-size: 13.5px;
color: var(–text-muted);
cursor: pointer;
transition: background 0.15s, color 0.15s;
line-height: 1.3;
}

.cat-btn:hover { background: var(–bg-tertiary); color: var(–text); }
.cat-btn.active { background: var(–highlight-bg); color: var(–highlight); font-weight: 500; }

.cat-btn .cat-count {
margin-left: auto;
font-size: 11px;
background: var(–bg-tertiary);
color: var(–text-muted);
border-radius: 10px;
padding: 1px 7px;
min-width: 22px;
text-align: center;
}

.cat-btn.active .cat-count { background: var(–highlight-bg); color: var(–highlight); }

.content {
padding: 28px 32px 60px;
}

.section-header {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 20px;
padding-bottom: 12px;
border-bottom: 2px solid var(–accent);
}

.section-header h2 {
font-size: 18px;
font-weight: 400;
letter-spacing: -0.02em;
color: var(–text);
}

.section-header .count-badge {
font-size: 12px;
background: var(–tag-bg);
color: var(–tag-text);
padding: 2px 9px;
border-radius: 10px;
}

.faq-section { margin-bottom: 40px; }

.faq-item {
border: 1px solid var(–border);
border-radius: var(–radius-lg);
margin-bottom: 8px;
overflow: hidden;
transition: border-color 0.2s;
}

.faq-item:hover { border-color: var(–border-hover); }
.faq-item.open { border-color: var(–accent); }

.faq-q {
width: 100%;
text-align: left;
background: none;
border: none;
padding: 15px 18px;
display: flex;
align-items: flex-start;
gap: 12px;
cursor: pointer;
font-family: ‘Modern Gothic’, sans-serif;
font-size: 14.5px;
font-weight: 500;
color: var(–text);
line-height: 1.4;
transition: background 0.15s;
}

.faq-q:hover { background: var(–bg-secondary); }
.faq-item.open .faq-q { background: var(–bg-secondary); }

.faq-chevron {
margin-left: auto;
flex-shrink: 0;
color: var(–text-muted);
font-size: 14px;
transition: transform 0.25s;
margin-top: 2px;
}

.faq-item.open .faq-chevron { transform: rotate(180deg); color: var(–accent); }

.faq-lang-tag {
flex-shrink: 0;
font-size: 10px;
font-weight: 400;
letter-spacing: 0.06em;
text-transform: uppercase;
background: var(–tag-bg);
color: var(–tag-text);
padding: 2px 7px;
border-radius: 4px;
margin-top: 2px;
display: none;
}

.faq-a {
display: none;
padding: 0 18px 18px 18px;
background: var(–answer-bg);
font-size: 14px;
color: var(–text);
line-height: 1.65;
}

.faq-a.visible { display: block; }

.faq-a p { margin-bottom: 10px; }
.faq-a p:last-child { margin-bottom: 0; }

.faq-a ul, .faq-a ol {
padding-left: 20px;
margin-bottom: 10px;
}

.faq-a li { margin-bottom: 5px; }

.faq-a table {
width: 100%;
border-collapse: collapse;
font-size: 13px;
margin: 10px 0;
}

.faq-a th {
text-align: left;
font-weight: 500;
padding: 8px 10px;
border-bottom: 2px solid var(–border-hover);
color: var(–text-muted);
}

.faq-a td {
padding: 8px 10px;
border-bottom: 1px solid var(–border);
vertical-align: top;
}

.faq-a tr:last-child td { border-bottom: none; }

.faq-a .note {
background: var(–blue-light);
border-left: 3px solid var(–accent);
padding: 10px 14px;
border-radius: 0 var(–radius) var(–radius) 0;
font-size: 13px;
margin: 10px 0;
color: var(–text);
}

.faq-a .warn {
background: #fff4e5;
border-left: 3px solid #e07a00;
padding: 10px 14px;
border-radius: 0 var(–radius) var(–radius) 0;
font-size: 13px;
margin: 10px 0;
color: var(–text);
}

[data-theme=“dark”] .faq-a .warn {
background: #251800;
border-left-color: #e09a00;
}

.faq-divider {
border: none;
border-top: 1px solid var(–border);
margin: 4px 0;
}

.section-header .share-btn {
background: none;
border: none;
color: var(–text-muted);
cursor: pointer;
padding: 3px 6px;
border-radius: var(–radius);
font-size: 13px;
opacity: 1;
transition: color 0.15s;
flex-shrink: 0;
line-height: 1;
margin-left: auto;
}
.section-header .share-btn:hover { color: var(–accent); }
.share-btn.copied { color: var(–accent); }

.q-share-btn {
background: none;
border: none;
color: var(–text-muted);
cursor: pointer;
padding: 2px 4px;
font-size: 11px;
opacity: 1;
transition: color 0.15s;
flex-shrink: 0;
line-height: 1;
margin-left: 6px;
border-radius: var(–radius);
}
.q-share-btn:hover { color: var(–accent); }
.q-share-btn.copied { color: var(–accent); }

.no-results {
text-align: center;
padding: 60px 20px;
color: var(–text-muted);
display: none;
}

.no-results i { font-size: 36px; margin-bottom: 12px; display: block; }
.no-results p { font-size: 14px; }

.result-count {
font-size: 13px;
color: var(–text-muted);
margin-bottom: 20px;
display: none;
}

footer {
border-top: 1px solid var(–border);
padding: 20px 32px;
text-align: center;
font-size: 12px;
color: var(–text-muted);
}

@media (max-width: 680px) {
.main { grid-template-columns: 1fr; }
.sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(–border); padding: 16px 20px; display: flex; gap: 8px; overflow-x: auto; flex-wrap: nowrap; }
.sidebar-label { display: none; }
.cat-btn { white-space: nowrap; flex-shrink: 0; }
.cat-btn .cat-count { display: none; }
header { padding: 14px 20px; }
.hero { padding: 24px 20px; }
.content { padding: 20px 20px 40px; }
}

.resources {
display: flex;
align-items: center;
gap: 8px;
margin-top: 20px;
flex-wrap: wrap;
}
.resources-label {
font-size: 12px;
text-transform: uppercase;
letter-spacing: 0.07em;
color: var(–text-muted);
font-weight: 500;
margin-right: 4px;
}
.resources a {
font-size: 13px;
padding: 5px 12px;
border-radius: 20px;
border: 1px solid var(–border-hover);
background: var(–bg);
color: var(–accent);
text-decoration: none;
transition: background 0.15s, border-color 0.15s;
white-space: nowrap;
}
.resources a:hover {
background: var(–bg-tertiary);
border-color: var(–accent);
opacity: 1;
}
#copy-toast {
position: fixed;
bottom: 28px;
left: 50%;
transform: translateX(-50%) translateY(12px);
background: var(–charcoal);
color: #f0ece0;
font-family: ‘Modern Gothic’, system-ui, sans-serif;
font-size: 14px;
padding: 10px 20px;
border-radius: 24px;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s, transform 0.2s;
z-index: 999;
white-space: nowrap;
}
[data-theme=“dark”] #copy-toast {
background: var(–bg-tertiary);
color: var(–text);
border: 1px solid var(–border-hover);
}
#copy-toast.visible {
opacity: 1;
transform: translateX(-50%) translateY(0);
}
</style>

const FAQ = [
  {
    cat: "avant",
    fr: {
      q: "Que dois-je faire dès que je connais mes projets?",

<div class="note">Knowing yourself is not a project you finish — it is an ongoing practice. And in a multicultural, multidisciplinary professional context like the hub, it is one of the most valuable skills you can develop.</div>`
    }
  },
  {

    fr: {

      a: `<p>Le harcèlement en milieu de travail commence rarement de façon évidente. Il s'installe souvent progressivement — un commentaire blessant, un ton de plus en plus condescendant, une pression répétée, une personne systématiquement ignorée ou rabaissée. Savoir le reconnaître tôt, que tu en sois l'auteur·rice, la cible, ou le témoin, fait toute la différence.</p>

<p><strong>Si tu remarques que tu te comportes d'une façon qui pourrait être perçue comme du harcèlement :</strong></p>

<ul>

</ul>

<p><strong>Si tu es témoin d'une situation qui ressemble à du harcèlement ou qui risque d'y évoluer :</strong></p>
<p>Tu as le choix de comment intervenir — et tous les choix sont valables.</p>
<ul>

  <li><strong>Signaler à Elisa pour qu'elle intervienne.</strong> Elle peut agir de façon à t'impliquer si tu le souhaites, ou à gérer la situation de façon à te garder complètement en dehors de ça, de manière anonyme si nécessaire.</li>

    en: {

];

function getCookie(name) {
  const m = document.cookie.match('(?:^|; )' + name + '=([^;]*)');
  return m ? decodeURIComponent(m[1]) : null;
}
function setCookie(name, value) {
  document.cookie = name + '=' + encodeURIComponent(value) + '; max-age=31536000; path=/; SameSite=Lax';
}
function getInitialLang() {
  const saved = getCookie('faq_lang');
  if (saved === 'fr' || saved === 'en') return saved;
  const browser = (navigator.language || navigator.userLanguage || 'fr').toLowerCase();
  return browser.startsWith('fr') ? 'fr' : 'en';
}
function getInitialTheme() {
  const saved = getCookie('faq_theme');
  if (saved === 'dark' || saved === 'light') return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

let currentLang = getInitialLang();
let currentCat = 'all';
let currentSearch = '';

function setLang(lang) {
  currentLang = lang;
  setCookie('faq_lang', lang);
  document.documentElement.lang = lang === 'en' ? 'en' : 'fr';

  const toggle = document.getElementById('lang-toggle');
  if (toggle) toggle.textContent = lang === 'en' ? 'FR' : 'EN';

  const heroTitle = document.getElementById('hero-title');
  const heroSub = document.getElementById('hero-sub');
  const searchInput = document.getElementById('search-input');
  if (lang === 'en') {
    heroTitle.textContent = 'Frequently Asked Questions';
    heroSub.textContent = 'Everything you need to know to do your internship at the Innovation Hub.';
    if (searchInput) searchInput.placeholder = 'Search…';
  } else {
    heroTitle.textContent = 'Questions fréquentes';
    heroSub.textContent = "Tout ce qu'il faut savoir pour faire ton stage à l'Innovation Hub.";
    if (searchInput) searchInput.placeholder = 'Rechercher…';
  }

  document.querySelectorAll('[data-fr]').forEach(el => {
    if (lang === 'en' && el.dataset.en) el.textContent = el.dataset.en;
    else el.textContent = el.dataset.fr;
  });

  render();
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  document.getElementById('theme-icon').className = isDark ? 'ti ti-moon' : 'ti ti-sun';
  setCookie('faq_theme', next);
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  currentSearch = '';
  document.getElementById('clear-btn').style.display = 'none';
  render();
}

function showCopyToast(lang) {
  let toast = document.getElementById('copy-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'copy-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = lang === 'en' ? 'Link copied!' : 'Lien copié\u00a0!';
  toast.classList.add('visible');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('visible'), 2000);
}

function copyShareLink(catId) {
  const url = location.href.split('#')[0] + '#' + catId;
  navigator.clipboard.writeText(url).catch(() => {});
  showCopyToast(currentLang);
}

function matchesSearch(item, query) {
  if (!query) return true;
  const check = (str) => str && str.toLowerCase().includes(query);
  return check(item.fr.q) || check(item.fr.a) || check(item.en.q) || check(item.en.a);
}

function render() {
  const container = document.getElementById('faq-sections');
  const noResults = document.getElementById('no-results');
  const resultCount = document.getElementById('result-count');
  const cats = ['avant', 'demarrage', 'semaine1', 'modalite', 'notation', 'outil', 'espaces', 'communication', 'equipe', 'taches', 'outil-log', 'fichiers', 'ip', 'conduite', 'multiprojet', 'productivite', 'interpersonnel', 'organisation'];

  const catLabels = {
    avant:         { fr: 'Avant le début du stage', en: 'Before the internship starts' },
    demarrage:     { fr: 'Journée de départ', en: 'Start date' },
    semaine1:      { fr: 'Première semaine', en: 'First week' },
    outil:         { fr: 'Outil de journal de stage', en: 'Internship log tool' },
    espaces:       { fr: 'Espaces de travail', en: 'Workspace' },
    communication: { fr: 'Règles de communication', en: 'Communication rules' },
    equipe:        { fr: 'Équipes & rôles', en: 'Teams & roles' },
    taches:        { fr: 'Tâches & planification dans un projet', en: 'Tasks & project planning' },
    'outil-log':   { fr: 'Dans l\'outil — fonctionnement détaillé', en: 'In the tool — detailed how-to' },
    fichiers:      { fr: 'Fichiers, documents & contrôle de version', en: 'Files, documents & version control' },
    ip:            { fr: 'Propriété intellectuelle & licences', en: 'Intellectual property & licences' },
    conduite:      { fr: 'Conduite professionnelle', en: 'Professional conduct' },
    multiprojet:   { fr: 'Travailler sur plusieurs projets', en: 'Working on multiple projects' },
    modalite:      { fr: 'Modalités de travail', en: 'Work modality' },
    notation:      { fr: 'Évaluation & notation', en: 'Grading' },
    productivite:  { fr: 'Productivité personnelle', en: 'Personal productivity' },
    interpersonnel:{ fr: 'Relations interpersonnelles', en: 'Interpersonal skills' },
    organisation:  { fr: 'Organisation du travail', en: 'Work organisation' }
  };

  let totalVisible = 0;
  let html = '';

  const activeCats = currentCat === 'all' ? cats : [currentCat];

  activeCats.forEach(cat => {
    const items = FAQ.filter(item => item.cat === cat && matchesSearch(item, currentSearch));
    if (items.length === 0) return;
    totalVisible += items.length;

    const label = catLabels[cat];
    const heading = currentLang === 'en' ? label.en : (currentLang === 'both' ? `${label.fr} · ${label.en}` : label.fr);

    html += `<section class="faq-section" data-cat="${cat}" id="${cat}">
      <div class="section-header">
        <h2>${heading}</h2>
        <span class="count-badge">${items.length}</span>
        <button class="share-btn" data-cat="${cat}" title="${currentLang === 'en' ? 'Copy link to this section' : 'Copier le lien vers cette section'}" aria-label="${currentLang === 'en' ? 'Copy link' : 'Copier le lien'}">&#x1F517;</button>
      </div>`;

    items.forEach((item, idx) => {
      const id = `faq-${cat}-${idx}`;
      if (currentLang === 'both') {
        html += renderItem(id + '-fr', item.fr, 'fr');
        html += renderItem(id + '-en', item.en, 'en');
      } else {
        const content = currentLang === 'en' ? item.en : item.fr;
        html += renderItem(id, content, null);
      }
    });

    html += `</section>`;
  });

  document.getElementById('count-all').textContent = FAQ.filter(i => matchesSearch(i, currentSearch)).length;
  cats.forEach(cat => {
    const el = document.getElementById('count-' + cat);
    if (el) el.textContent = FAQ.filter(i => i.cat === cat && matchesSearch(i, currentSearch)).length;
  });

  container.innerHTML = html;

  if (totalVisible === 0) {
    noResults.style.display = 'block';
    const noEl = noResults.querySelector('p');
    if (currentLang === 'en') noEl.textContent = 'No results found. Try different keywords.';
    else noEl.textContent = "Aucun résultat trouvé. Essaie d'autres mots-clés.";
    resultCount.style.display = 'none';
  } else {
    noResults.style.display = 'none';
    if (currentSearch) {
      resultCount.style.display = 'block';
      resultCount.textContent = currentLang === 'en'
        ? `${totalVisible} result${totalVisible !== 1 ? 's' : ''} for "${currentSearch}"`
        : `${totalVisible} résultat${totalVisible !== 1 ? 's' : ''} pour « ${currentSearch} »`;
    } else {
      resultCount.style.display = 'none';
    }
  }

  if (currentSearch) {
    container.querySelectorAll('.faq-item').forEach(item => {
      item.classList.add('open');
      item.querySelector('.faq-a').classList.add('visible');
    });
  }
}

function renderItem(id, content, lang) {
  const langTag = lang ? `<span class="faq-lang-tag" style="display:inline-block">${lang.toUpperCase()}</span>` : '';
  return `<div class="faq-item" id="${id}">
    <button class="faq-q" aria-expanded="false">
      ${langTag}
      <span>${content.q}</span>
      <button class="q-share-btn" data-id="${id}" title="${currentLang === 'en' ? 'Copy link to this question' : 'Copier le lien vers cette question'}" aria-label="${currentLang === 'en' ? 'Copy link' : 'Copier le lien'}" tabindex="0">&#x1F517;</button>
      <i class="ti ti-chevron-down faq-chevron" aria-hidden="true"></i>
    </button>
    <div class="faq-a" role="region">${content.a}</div>
  </div>`;
}

document.addEventListener('DOMContentLoaded', function() {
  const initialTheme = getInitialTheme();
  if (initialTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-icon').className = 'ti ti-sun';
  }

  setLang(currentLang);

  document.getElementById('lang-toggle').addEventListener('click', function() {
    setLang(currentLang === 'fr' ? 'en' : 'fr');
  });

  document.getElementById('theme-btn').addEventListener('click', toggleTheme);
  document.getElementById('clear-btn').addEventListener('click', clearSearch);

  document.getElementById('search-input').addEventListener('input', function() {
    currentSearch = this.value.toLowerCase().trim();
    document.getElementById('clear-btn').style.display = currentSearch ? 'block' : 'none';
    render();
  });

  document.querySelector('.sidebar').addEventListener('click', function(e) {
    const btn = e.target.closest('.cat-btn');
    if (btn) filterCat(btn.dataset.cat);
  });

  document.getElementById('faq-sections').addEventListener('click', function(e) {
    const qShareBtn = e.target.closest('.q-share-btn');
    if (qShareBtn) {
      e.stopPropagation();
      const url = location.href.split('#')[0] + '#' + qShareBtn.dataset.id;
      navigator.clipboard.writeText(url).catch(() => {});
      qShareBtn.classList.add('copied');
      setTimeout(() => qShareBtn.classList.remove('copied'), 1500);
      showCopyToast(currentLang);
      return;
    }
    const shareBtn = e.target.closest('.share-btn');
    if (shareBtn) {
      copyShareLink(shareBtn.dataset.cat);
      shareBtn.classList.add('copied');
      setTimeout(() => shareBtn.classList.remove('copied'), 1500);
      return;
    }
    const qBtn = e.target.closest('.faq-q');
    if (qBtn) {
      const item = qBtn.closest('.faq-item');
      const answer = item.querySelector('.faq-a');
      const isOpen = item.classList.contains('open');
      item.classList.toggle('open', !isOpen);
      answer.classList.toggle('visible', !isOpen);
      qBtn.setAttribute('aria-expanded', String(!isOpen));
    }
  });

  if (location.hash) {
    const hash = location.hash.slice(1);
    const validCats = ['avant','demarrage','semaine1','modalite','notation','outil','espaces','communication','equipe','taches','outil-log','fichiers','ip','conduite','multiprojet'];
    if (validCats.includes(hash)) {
      filterCat(hash);
      setTimeout(() => {
        const el = document.getElementById(hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    } else if (hash.startsWith('faq-')) {
      // Deep link to a specific question
      setTimeout(() => {
        const el = document.getElementById(hash);
        if (el) {
          el.classList.add('open');
          el.querySelector('.faq-a').classList.add('visible');
          el.querySelector('.faq-q').setAttribute('aria-expanded', 'true');
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 100);
    }
  }
});
</script>
