<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech & Design — Program Profile</title>
<style>
:root {
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --lci-red: #E3001B;
  --state-partial-opacity:  0.45;
  --state-passive-opacity:  0.15;
  --badge-size:   22px;
  --badge-gap:    3px;
  --badge-radius: 5px;
  --transition:   240ms ease;
}
[data-theme="light"] {
  --bg: #F0EDE8; --surface: #FFFFFF; --surface-alt: #E8E4DE;
  --border: #C8C3BB; --border-strong: #8A8480;
  --text: #1A1A1A; --text-secondary: #5A5652; --text-muted: #9A9490;
  --canvas-bg: #E8E4DE; --canvas-dot: rgba(0,0,0,0.07);
  --box-bg: #FFFFFF; --box-bg-passive: #DEDBD6;
  --box-border: #8A8480; --box-border-pass: #C0BCB6;
  --row-bg-0: #E8E5DF;
  --row-bg-1: #DEDAD4;
  --row-bg-2: #D4D0C9;
  --row-bg-3: #C9C5BE;
  --row-bg-4: #BEBAB2;
}
[data-theme="dark"] {
  --bg: #111111; --surface: #1C1C1C; --surface-alt: #242424;
  --border: #333333; --border-strong: #505050;
  --text: #F0EDE8; --text-secondary: #A8A49F; --text-muted: #626060;
  --canvas-bg: #151515; --canvas-dot: rgba(255,255,255,0.045);
  --box-bg: #242424; --box-bg-passive: #181818;
  --box-border: #505050; --box-border-pass: #2E2E2E;
  --row-bg-0: #1E1E1E;
  --row-bg-1: #252525;
  --row-bg-2: #2C2C2C;
  --row-bg-3: #333333;
  --row-bg-4: #3A3A3A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font); background: var(--bg); color: var(--text); transition: background var(--transition), color var(--transition); min-height: 100vh; }

header { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
.logo { display: flex; align-items: center; }
.logo-text { font-size: 0.8rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); }
.logo-sub { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
.header-controls { display: flex; align-items: center; gap: 10px; }
.lang-btn { font-family: var(--font); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 11px; border-radius: 4px; border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 150ms ease; }
.lang-btn:hover { border-color: var(--border-strong); color: var(--text); }
.lang-btn.active { background: var(--lci-red); border-color: var(--lci-red); color: white; }
.theme-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 150ms ease; font-size: 0.9rem; }
.theme-btn:hover { border-color: var(--border-strong); color: var(--text); }

.app-body { display: flex; height: calc(100vh - 56px); }

.sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 20px 16px; gap: 20px; }
.sidebar-label { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.select-actions { display: flex; gap: 6px; margin-top: 10px; }
.select-action-btn { flex: 1; font-family: var(--font); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 5px 8px; border-radius: 4px; border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 150ms ease; }
.select-action-btn:hover { border-color: var(--border-strong); color: var(--text); }
.program-list { display: flex; flex-direction: column; gap: 4px; }
.program-item { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 7px; cursor: pointer; border: 1.5px solid transparent; transition: all 150ms ease; user-select: none; }
.program-item:hover { background: var(--surface-alt); }
.program-item.selected { background: var(--surface-alt); border-color: var(--prog-color); }
.prog-badge { width: var(--badge-size); height: var(--badge-size); border-radius: var(--badge-radius); background: var(--prog-color); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.prog-badge svg { width: 60%; height: 60%; fill: white; }
.prog-name { font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); line-height: 1.2; transition: color 150ms ease; }
.program-item.selected .prog-name { color: var(--text); font-weight: 600; }
.state-legend { display: flex; flex-direction: column; gap: 6px; }
.state-item { display: flex; align-items: center; gap: 9px; font-size: 0.72rem; color: var(--text-secondary); }
.state-swatch { width: 32px; height: 18px; border-radius: 4px; border: 1.5px solid var(--box-border); background: var(--box-bg); flex-shrink: 0; }
.state-swatch.partial { opacity: var(--state-partial-opacity); }
.state-swatch.passive { opacity: var(--state-passive-opacity); border-color: var(--box-border-pass); background: var(--box-bg-passive); }

.canvas { flex: 1; overflow: auto; background-color: var(--canvas-bg); background-image: radial-gradient(circle, var(--canvas-dot) 1px, transparent 1px); background-size: 22px 22px; padding: 48px 40px 80px; display: flex; flex-direction: column; align-items: center; }

.diagram-row-wrap { width: 100%; max-width: 1200px; }
.diagram-row-wrap:nth-child(odd) .diagram-row  { background: var(--row-bg-0); }
.diagram-row-wrap:nth-child(even) .diagram-row { background: var(--row-bg-2); }

/* Override with explicit index-based tinting */
.diagram-row-wrap[data-row-idx="0"] .diagram-row { background: var(--row-bg-0); }
.diagram-row-wrap[data-row-idx="1"] .diagram-row { background: var(--row-bg-1); }
.diagram-row-wrap[data-row-idx="2"] .diagram-row { background: var(--row-bg-2); }
.diagram-row-wrap[data-row-idx="3"] .diagram-row { background: var(--row-bg-3); }
.diagram-row-wrap[data-row-idx="4"] .diagram-row { background: var(--row-bg-4); }

.diagram-row { display: flex; justify-content: center; align-items: flex-start; flex-wrap: wrap; gap: 24px 28px; width: 100%; position: relative; padding: 28px 52px 20px 16px; border-radius: 12px; }
.row-connector { width: 2px; height: 20px; background: var(--border-strong); opacity: 0.4; margin: 0 auto; }

/* Row label on RIGHT side */
.row-label { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); position: absolute; right: 10px; top: 50%; transform: translateY(-50%) rotate(180deg); writing-mode: vertical-lr; white-space: nowrap; }

/* Extra top padding to accommodate 2-row badge cluster */
.comp-box-wrap { position: relative; padding-top: 56px; }
.comp-box { position: relative; min-width: 120px; max-width: 200px; padding: 12px 16px; border-radius: 10px; border: 2px solid var(--box-border); background: var(--box-bg); text-align: center; cursor: default; transition: background var(--transition), border-color var(--transition), opacity var(--transition), box-shadow 150ms ease, transform 150ms ease; }
.comp-box:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.1); transform: translateY(-1px); }
.comp-box__title { font-size: 0.8rem; font-weight: 700; line-height: 1.25; color: var(--text); transition: color var(--transition); }

.comp-box-wrap[data-state="partial"] .comp-box { opacity: var(--state-partial-opacity); }
.comp-box-wrap[data-state="passive"] .comp-box { opacity: var(--state-passive-opacity); border-color: var(--box-border-pass); background: var(--box-bg-passive) !important; }
.comp-box-wrap[data-state="passive"] .comp-box__title { color: var(--text-muted); }

/* Badge cluster: fixed 5 columns × 2 rows, badges fill from bottom-right */
.badge-cluster {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: repeat(5, var(--badge-size));
  grid-template-rows: repeat(2, var(--badge-size));
  gap: var(--badge-gap);
  z-index: 10;
}
.badge-spacer {
  width: var(--badge-size);
  height: var(--badge-size);
}
.mini-badge { width: var(--badge-size); height: var(--badge-size); border-radius: var(--badge-radius); background: var(--prog-color); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 150ms ease, opacity 150ms ease; cursor: help; }
.mini-badge svg { width: 58%; height: 58%; fill: white; }
.mini-badge:hover { transform: scale(1.2); z-index: 20; }
.mini-badge[data-intensity="partial"] { opacity: 0.5; }

.tooltip { position: fixed; z-index: 500; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 6px; padding: 6px 10px; font-size: 0.7rem; font-weight: 600; color: var(--text); pointer-events: none; opacity: 0; transition: opacity 120ms ease; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
.tooltip.show { opacity: 1; }
</style>

  'sustainable':   {core:['interior-design'],                                                                              related:['uiux-design','ai','graphic-design'], passive:['game-programming','programming','networking','game-level-design','3d-animation','video-editing']},
  'scalable':      {core:['programming','networking','ai'],                                                                related:['uiux-design','game-programming','game-level-design'], passive:['3d-animation','interior-design','graphic-design','video-editing']},
  'freelance':     {core:['game-level-design','3d-animation','interior-design','graphic-design','video-editing'],          related:['uiux-design'], passive:['game-programming','programming','networking','ai']},
  'entrepreneur':  {core:['uiux-design','game-programming','programming','networking','ai','game-level-design','3d-animation','interior-design','graphic-design'], related:['video-editing'], passive:[]},
  'employee':      {core:['uiux-design','game-programming','programming','networking','ai','game-level-design','3d-animation','interior-design','graphic-design','video-editing'], related:[], passive:[]},
  'consultant':    {core:['uiux-design','programming','networking','ai'],                                                  related:['game-programming','interior-design','graphic-design'], passive:['game-level-design','3d-animation','video-editing']},
  'trainer':       {core:['uiux-design','game-programming','programming','networking','ai','game-level-design','3d-animation','interior-design','graphic-design','video-editing'], related:[], passive:[]},
};

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function avgRgb(colors) {
  const n = colors.length;
  const sum = colors.reduce((acc,[r,g,b]) => [acc[0]+r, acc[1]+g, acc[2]+b], [0,0,0]);
  return sum.map(v => Math.round(v/n));
}

function getBoxTint(boxId, selectedPrograms, state) {
  if (state === 'passive' || selectedPrograms.size === 0) return null;
  const m = MAPPING[boxId];
  const opacity = state === 'active' ? 0.18 : 0.09;
  const relevant = PROGRAMS.filter(p => selectedPrograms.has(p.id) && (m.core.includes(p.id) || m.related.includes(p.id)));
  if (relevant.length === 0) return null;
  const families = ['blue','yellow','brown'];
  const byFamily = {};
  families.forEach(f => {
    const progs = relevant.filter(p => p.family === f);
    if (progs.length > 0) byFamily[f] = avgRgb(progs.map(p => hexToRgb(p.color)));
  });
  const presentFamilies = families.filter(f => byFamily[f]);
  if (presentFamilies.length === 1) {
    const [r,g,b] = byFamily[presentFamilies[0]];
    return `rgba(${r},${g},${b},${opacity})`;
  }
  const stops = presentFamilies.map(f => { const [r,g,b] = byFamily[f]; return `rgba(${r},${g},${b},${opacity})`; });
  return `linear-gradient(to right, ${stops.join(', ')})`;
}

function getBoxState(boxId) {
  if (selectedPrograms.size === 0) return 'active';
  const m = MAPPING[boxId];
  for (const pid of selectedPrograms) if (m.core.includes(pid)) return 'active';
  for (const pid of selectedPrograms) if (m.related.includes(pid)) return 'partial';
  return 'passive';
}

function getBadgePrograms(boxId) {
  if (selectedPrograms.size === 0) return [];
  const m = MAPPING[boxId];
  return PROGRAMS.filter(p => selectedPrograms.has(p.id) && (m.core.includes(p.id) || m.related.includes(p.id)))
    .map(p => ({prog: p, intensity: m.core.includes(p.id) ? 'active' : 'partial'}));
}

let currentLang = 'en';
let selectedPrograms = new Set();

function render() { renderSidebar(); renderDiagram(); updateTexts(); }

function renderSidebar() {
  const list = document.getElementById('program-list');
  list.innerHTML = '';
  PROGRAMS.forEach(p => {
    const item = document.createElement('div');
    item.className = 'program-item' + (selectedPrograms.has(p.id) ? ' selected' : '');
    item.style.setProperty('--prog-color', p.color);
    item.innerHTML = `<div class="prog-badge">${SYMBOLS[p.id]}</div><div class="prog-name">${p[currentLang]}</div>`;
    item.onclick = () => toggleProgram(p.id);
    list.appendChild(item);
  });
}

function renderDiagram() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  ROWS.forEach((row, rowIdx) => {
    if (rowIdx > 0) {
      const conn = document.createElement('div');
      conn.className = 'row-connector';
      canvas.appendChild(conn);
    }

    const wrapEl = document.createElement('div');
    wrapEl.className = 'diagram-row-wrap';
    wrapEl.dataset.rowIdx = rowIdx;

    const rowEl = document.createElement('div');
    rowEl.className = 'diagram-row';

    const rowLabel = document.createElement('div');
    rowLabel.className = 'row-label';
    rowLabel.textContent = LANGS[currentLang].rowLabels[rowIdx];
    rowEl.appendChild(rowLabel);

    row.boxes.forEach(box => {
      const state = getBoxState(box.id);
      const badges = getBadgePrograms(box.id);
      const tint = getBoxTint(box.id, selectedPrograms, state);

      const wrap = document.createElement('div');
      wrap.className = 'comp-box-wrap';
      wrap.dataset.state = state;

      const cluster = document.createElement('div');
      cluster.className = 'badge-cluster';
      // Fixed 10-cell grid (2 rows × 5 cols); prepend spacers so badges fill from bottom-right, expanding left then up
      const cappedBadges = badges.slice(0, 10);
      for (let i = 0; i < 10 - cappedBadges.length; i++) {
        const spacer = document.createElement('div');
        spacer.className = 'badge-spacer';
        cluster.appendChild(spacer);
      }
      cappedBadges.forEach(({prog, intensity}) => {
        const badge = document.createElement('div');
        badge.className = 'mini-badge';
        badge.style.setProperty('--prog-color', prog.color);
        badge.dataset.intensity = intensity;
        badge.innerHTML = SYMBOLS[prog.id];
        badge.addEventListener('mouseenter', e => showTooltip(e, prog[currentLang]));
        badge.addEventListener('mouseleave', hideTooltip);
        cluster.appendChild(badge);
      });
      wrap.appendChild(cluster);

      const boxEl = document.createElement('div');
      boxEl.className = 'comp-box';
      if (tint && state !== 'passive') boxEl.style.background = tint;
      boxEl.innerHTML = `<div class="comp-box__title">${box[currentLang]}</div>`;
      wrap.appendChild(boxEl);
      rowEl.appendChild(wrap);
    });

    wrapEl.appendChild(rowEl);
    canvas.appendChild(wrapEl);
  });
}

function updateTexts() {
  const L = LANGS[currentLang];
  document.getElementById('header-sub').textContent = L.headerSub;
  document.getElementById('label-programs').textContent = L.labelPrograms;
  document.getElementById('label-states').textContent = L.labelStates;
  document.getElementById('btn-select-all').textContent = L.selectAll;
  document.getElementById('btn-clear').textContent = L.clear;
  document.getElementById('state-active-label').textContent = L.stateActive;
  document.getElementById('state-partial-label').textContent = L.statePartial;
  document.getElementById('state-passive-label').textContent = L.statePassive;
  document.documentElement.lang = currentLang;
}

function toggleProgram(id) {
  if (selectedPrograms.has(id)) selectedPrograms.delete(id);
  else selectedPrograms.add(id);
  render();
}
function selectAll() { PROGRAMS.forEach(p => selectedPrograms.add(p.id)); render(); }
function clearAll() { selectedPrograms.clear(); render(); }
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  render();
}
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('theme-btn').textContent = isDark ? '☀' : '☾';
}

const tooltipEl = document.getElementById('tooltip');
function showTooltip(e, text) {
  tooltipEl.textContent = text;
  tooltipEl.classList.add('show');
  moveTooltip(e);
  e.target.addEventListener('mousemove', moveTooltip);
}
function moveTooltip(e) {
  tooltipEl.style.left = (e.clientX + 12) + 'px';
  tooltipEl.style.top  = (e.clientY - 28) + 'px';
}
function hideTooltip(e) {
  tooltipEl.classList.remove('show');
  e.target.removeEventListener('mousemove', moveTooltip);
}

render();
</script>
